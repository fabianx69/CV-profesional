        function setLanguage(lang) {
            const data = translations[lang] || translations['en'];
            const container = document.getElementById('main-container');
            container.style.opacity = 0;

            setTimeout(() => {
                document.getElementById('title-tag').innerText = data.title;
                document.getElementById('lbl-profile').innerText = data.profile;
                document.getElementById('val-profile').innerText = data.profileDesc;
                document.getElementById('lbl-edu').innerText = data.edu;
                document.getElementById('val-edu').innerHTML = data.eduData;
                document.getElementById('lbl-skills').innerText = data.skills;
                document.getElementById('lbl-projs').innerText = data.projs;
                document.getElementById('lbl-exp').innerText = data.exp;
                document.getElementById('val-exp').innerHTML = data.expData;
                document.getElementById('lbl-certs').innerText = data.certs;

                document.getElementById('val-skills').innerHTML = data.skillsData.map(s => `<div><p class="font-bold text-xs text-slate-800 uppercase tracking-wide">${s.cat}</p><p class="text-sm text-slate-600">${s.val}</p></div>`).join('');
                
                document.getElementById('val-certs').innerHTML = data.certsData.map(g => `<div><p class="text-[11px] font-bold text-blue-600 mb-2 uppercase tracking-widest">${g.emisor}</p><div class="flex flex-wrap gap-2">${g.lista.map(c => `<span class="skill-badge">${c}</span>`).join('')}</div></div>`).join('');

                document.getElementById('val-projs').innerHTML = data.projsData.map(p => `<div><h3 class="font-bold text-sm text-blue-700">${p.t}</h3><p class="text-sm text-slate-600 mt-1 text-justify">${p.d}</p></div>`).join('');

                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('text-blue-600'));
                document.getElementById('btn-' + lang).classList.add('text-blue-600');
                container.style.opacity = 1;
            }, 300);
        }
